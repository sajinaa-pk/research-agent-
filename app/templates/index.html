<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 16px 24px;
        }

        header h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; }
        header p { font-size: 13px; color: #888; margin-top: 2px; }

        #container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #input-row {
            display: flex;
            gap: 12px;
        }

        #question-input {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }

        #question-input:focus { border-color: #1a1a1a; }

        #run-btn {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            white-space: nowrap;
        }

        #run-btn:hover { background: #333; }
        #run-btn:disabled { background: #ccc; cursor: not-allowed; }

        #agent-log {
            background: #1a1a1a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border-radius: 12px;
            padding: 16px 20px;
            min-height: 60px;
            display: none;
            flex-direction: column;
            gap: 4px;
        }

        #agent-log.active { display: flex; }

        .log-line {
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        #report {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 24px;
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
            display: none;
        }

        #report.active { display: block; }

        #report-label {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Research Agent</h1>
        <p>Plans queries, searches the web, evaluates findings, writes a report</p>
    </header>

    <div id="container">
        <div id="input-row">
            <input
                type="text"
                id="question-input"
                placeholder="Ask a research question..."
                onkeydown="if(event.key==='Enter') runAgent()"
            >
            <button id="run-btn" onclick="runAgent()">Research</button>
        </div>

        <div id="agent-log"></div>

        <div id="report">
            <div id="report-label">Final report</div>
            <div id="report-text"></div>
        </div>
    </div>

    <script>
        async function runAgent() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            if (!question) return;

            const runBtn = document.getElementById('run-btn');
            const logEl = document.getElementById('agent-log');
            const reportEl = document.getElementById('report');
            const reportText = document.getElementById('report-text');

            runBtn.disabled = true;
            logEl.innerHTML = '';
            logEl.classList.add('active');
            reportEl.classList.remove('active');
            reportText.textContent = '';

            try {
                const response = await fetch('/research', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.type === 'log') {
                            const logLine = document.createElement('div');
                            logLine.className = 'log-line';
                            logLine.textContent = '> ' + data.content;
                            logEl.appendChild(logLine);
                        } else if (data.type === 'report_start') {
                            reportEl.classList.add('active');
                        } else if (data.type === 'report_chunk') {
                            reportText.textContent += data.content;
                        }
                    }
                }
            } catch (err) {
                const errLine = document.createElement('div');
                errLine.className = 'log-line';
                errLine.textContent = '> Error: ' + err.message;
                logEl.appendChild(errLine);
            } finally {
                runBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
